<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>СкладПро</title>

  <!-- PWA -->

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="СкладПро" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="manifest" href="manifest.json" />

  <!-- Icons -->

  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', Arial, sans-serif; }
    #root { min-height: 100vh; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #1a202c; }
    ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 2px; }
  </style>

</head>
<body>
  <div id="root"></div>

  <!-- React -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel for JSX -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- SheetJS for Excel export -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const TABS = ["Товары", "Приход", "Расход", "Остатки", "Аналитика"];
    const MONTHS_RU = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
    const GROUP_COLORS = ["#667eea","#48bb78","#ed8936","#e53e3e","#9f7aea","#38b2ac","#f6ad55","#fc8181","#68d391","#63b3ed"];

    function useLS(key, init) {
      const [v, setV] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; } });
      useEffect(() => { localStorage.setItem(key, JSON.stringify(v)); }, [key, v]);
      return [v, setV];
    }
    function fmt(n) { return Number(n||0).toLocaleString("ru-RU",{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function today() { return new Date().toISOString().split("T")[0]; }

    function exportCSV(items, groups) {
      const headers = ["Код товара","Группа","Наименование","Остаток (шт)","Ср. себестоимость","Сумма на складе","Статус"];
      const rows = [...items].sort((a,b)=>a.code.localeCompare(b.code)).map(p => {
        const grp = groups.find(g=>g.id===p.groupId);
        const status = p.qty<=0?"Нет в наличии":p.qty<5?"Заканчивается":"В наличии";
        return [p.code, grp?.name||"—", p.name, p.qty, Number(p.avgCost.toFixed(2)), Number((p.qty*p.avgCost).toFixed(2)), status];
      });
      const totalQty = items.reduce((s,i)=>s+i.qty,0);
      const totalSum = Number(items.reduce((s,i)=>s+i.qty*i.avgCost,0).toFixed(2));
      rows.push(["","","Итого:", totalQty, "", totalSum, ""]);
      const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `Остатки_${new Date().toLocaleDateString("ru-RU").replaceAll(".","-")}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    function exportExcel(items, groups) {
      if (window.XLSX) {
        const XLSX = window.XLSX;
        const date = new Date().toLocaleDateString("ru-RU");
        const rows = [...items].sort((a,b)=>a.code.localeCompare(b.code)).map(p => {
          const grp = groups.find(g=>g.id===p.groupId);
          return { "Код товара":p.code, "Группа":grp?.name||"—", "Наименование":p.name,
            "Остаток (шт)":p.qty, "Ср. себестоимость":Number(p.avgCost.toFixed(2)),
            "Сумма на складе":Number((p.qty*p.avgCost).toFixed(2)),
            "Статус":p.qty<=0?"Нет в наличии":p.qty<5?"Заканчивается":"В наличии" };
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        ws["!cols"] = [{wch:12},{wch:16},{wch:30},{wch:14},{wch:18},{wch:18},{wch:16}];
        const lr = rows.length + 1;
        XLSX.utils.sheet_add_aoa(ws,[["","","Итого:",items.reduce((s,i)=>s+i.qty,0),"",Number(items.reduce((s,i)=>s+i.qty*i.avgCost,0).toFixed(2)),""]],{origin:lr+1});
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Остатки");
        XLSX.writeFile(wb, `Остатки_${date.replaceAll(".","-")}.xlsx`);
      } else {
        exportCSV(items, groups);
      }
    }

    // ── ACTION MENU ──────────────────────────────────────────────────────────
    function ActionMenu({ onEdit, onDelete }) {
      const [open, setOpen] = useState(false);
      const ref = useRef();
      useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);
      return (
        <div ref={ref} style={{position:"relative",display:"inline-block"}}>
          <button onClick={() => setOpen(o=>!o)} style={{background:"#2d3748",border:"1px solid #4a5568",color:"#a0aec0",width:30,height:30,borderRadius:6,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>•••</button>
          {open && (
            <div style={{position:"absolute",right:0,top:34,background:"#1a202c",border:"1px solid #2d3748",borderRadius:8,zIndex:200,minWidth:160,boxShadow:"0 8px 24px rgba(0,0,0,0.7)"}}>
              <button onClick={() => { setOpen(false); onEdit(); }} style={{display:"block",width:"100%",padding:"10px 16px",background:"none",border:"none",color:"#e2e8f0",textAlign:"left",cursor:"pointer",fontSize:13,borderRadius:"8px 8px 0 0"}}
                onMouseOver={e=>e.currentTarget.style.background="#2d3748"} onMouseOut={e=>e.currentTarget.style.background="none"}>✏️ Редактировать</button>
              <div style={{height:1,background:"#2d3748"}} />
              <button onClick={() => { setOpen(false); onDelete(); }} style={{display:"block",width:"100%",padding:"10px 16px",background:"none",border:"none",color:"#fc8181",textAlign:"left",cursor:"pointer",fontSize:13,borderRadius:"0 0 8px 8px"}}
                onMouseOver={e=>e.currentTarget.style.background="#2d3748"} onMouseOut={e=>e.currentTarget.style.background="none"}>🗑️ Удалить</button>
            </div>
          )}
        </div>
      );
    }

    // ── UI COMPONENTS ────────────────────────────────────────────────────────
    const labelStyle = {fontSize:11,color:"#718096",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5};
    const selectStyle = {background:"#2d3748",border:"1px solid #4a5568",color:"#e2e8f0",padding:"7px 10px",borderRadius:6,fontSize:13,cursor:"pointer",outline:"none",width:"100%"};

    function SectionTitle({icon,title}) {
      return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{fontSize:20}}>{icon}</span><span style={{fontSize:17,fontWeight:700,color:"#e2e8f0"}}>{title}</span></div>;
    }
    function Card({children,style}) {
      return <div style={{background:"#1a1f2e",border:"1px solid #2d3748",borderRadius:10,padding:16,...style}}>{children}</div>;
    }
    function Input({label,value,onChange,placeholder,type="text",style,flex,readOnly}) {
      const cs = { display:"flex",flexDirection:"column",gap:4,...(flex?{flex}:{}),...(style||{}) };
      return (
        <div style={cs}>
          {label && <label style={labelStyle}>{label}</label>}
          <input type={type} value={value} onChange={onChange?e=>onChange(e.target.value):undefined} placeholder={placeholder} readOnly={readOnly}
            style={{background:readOnly?"#1a202c":"#2d3748",border:"1px solid #4a5568",color:readOnly?"#718096":"#e2e8f0",padding:"7px 10px",borderRadius:6,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}} />
        </div>
      );
    }
    function Btn({children,onClick,color}) {
      return <button onClick={onClick} style={{background:color,border:"none",color:"#fff",padding:"8px 16px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{children}</button>;
    }
    function StatCard({label,value,color}) {
      return <div style={{background:"#1a1f2e",border:`1px solid ${color}33`,borderLeft:`3px solid ${color}`,borderRadius:8,padding:"10px 16px",minWidth:130}}><div style={{fontSize:11,color:"#718096",marginBottom:4}}>{label}</div><div style={{fontSize:17,fontWeight:700,color}}>{value}</div></div>;
    }
    function GroupPill({children,active,onClick,color}) {
      return <button onClick={onClick} style={{background:active?color+"33":"#1a202c",border:`1px solid ${active?color:color+"44"}`,color:active?color:"#718096",padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:active?600:400,whiteSpace:"nowrap"}}>{children}</button>;
    }
    function Table({headers,children,style}) {
      return <div style={{overflowX:"auto",...style}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:"#1a202c"}}>{headers.map((h,i)=><th key={i} style={{padding:"8px 12px",color:"#718096",fontWeight:600,textAlign:"left",fontSize:11,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #2d3748",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{children}</tbody></table></div>;
    }
    function Td({children,bold,mono,right,small,muted,style}) {
      return <td style={{padding:"8px 12px",borderBottom:"1px solid #1a202c",fontWeight:bold?600:400,fontFamily:mono?"monospace":"inherit",textAlign:right?"right":"left",fontSize:small?12:13,color:muted?"#718096":"inherit",whiteSpace:"nowrap",...style}}>{children}</td>;
    }
    function EmptyRow({cols,text}) {
      return <tr><td colSpan={cols} style={{padding:"24px",textAlign:"center",color:"#4a5568",fontSize:13}}>{text}</td></tr>;
    }

    // ── PRODUCTS TAB ─────────────────────────────────────────────────────────
    function ProductsTab({ products, setProducts, groups, setGroups }) {
      const [form, setForm] = useState({ code:"", name:"", groupId:"" });
      const [editId, setEditId] = useState(null);
      const [search, setSearch] = useState("");
      const [filterGroup, setFilterGroup] = useState("all");
      const [showGForm, setShowGForm] = useState(false);
      const [gForm, setGForm] = useState({ name:"", color:GROUP_COLORS[0] });
      const [editGId, setEditGId] = useState(null);

      const saveGroup = () => {
        if (!gForm.name.trim()) return;
        if (editGId !== null) { setGroups(prev=>prev.map(g=>g.id===editGId?{...g,...gForm}:g)); setEditGId(null); }
        else setGroups(prev=>[...prev,{...gForm,id:Date.now()}]);
        setGForm({ name:"", color:GROUP_COLORS[0] }); setShowGForm(false);
      };
      const delGroup = (id) => {
        if (products.find(p=>p.groupId===id)) { alert("Сначала удалите или переместите товары этой группы."); return; }
        if (confirm("Удалить группу?")) setGroups(prev=>prev.filter(g=>g.id!==id));
      };
      const save = () => {
        if (!form.code.trim()||!form.name.trim()) return;
        if (editId !== null) { setProducts(prev=>prev.map(p=>p.id===editId?{...p,...form}:p)); setEditId(null); }
        else {
          if (products.find(p=>p.code===form.code.trim())) { alert("Код уже существует!"); return; }
          setProducts(prev=>[...prev,{...form,id:Date.now()}]);
        }
        setForm({ code:"", name:"", groupId:"" });
      };
      const startEdit = (p) => { setForm({ code:p.code, name:p.name, groupId:p.groupId||"" }); setEditId(p.id); };
      const del = (id) => { if (confirm("Удалить товар?")) setProducts(prev=>prev.filter(p=>p.id!==id)); };

      const filtered = products.filter(p => {
        const ms = p.name.toLowerCase().includes(search.toLowerCase())||p.code.toLowerCase().includes(search.toLowerCase());
        const mg = filterGroup==="all"||p.groupId===filterGroup||(filterGroup==="nogroup"&&!p.groupId);
        return ms && mg;
      });
      const getGroup = id => groups.find(g=>g.id===id);

      return (
        <div>
          <SectionTitle icon="🏷️" title="Справочник товаров" />
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:600,color:"#a0aec0"}}>Группы товаров</span>
              <button onClick={() => { setShowGForm(true); setEditGId(null); setGForm({ name:"", color:GROUP_COLORS[0] }); }} style={{background:"#2d3748",border:"1px solid #4a5568",color:"#e2e8f0",padding:"4px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>+ Новая группа</button>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <GroupPill active={filterGroup==="all"} onClick={()=>setFilterGroup("all")} color="#667eea">Все ({products.length})</GroupPill>
              <GroupPill active={filterGroup==="nogroup"} onClick={()=>setFilterGroup("nogroup")} color="#718096">Без группы ({products.filter(p=>!p.groupId).length})</GroupPill>
              {groups.map(g=>(
                <div key={g.id} style={{display:"flex",alignItems:"center",gap:4}}>
                  <GroupPill active={filterGroup===g.id} onClick={()=>setFilterGroup(g.id)} color={g.color}>{g.name} ({products.filter(p=>p.groupId===g.id).length})</GroupPill>
                  <ActionMenu onEdit={()=>{ setGForm({name:g.name,color:g.color}); setEditGId(g.id); setShowGForm(true); }} onDelete={()=>delGroup(g.id)} />
                </div>
              ))}
            </div>
          </div>

          {showGForm && (
            <Card style={{marginBottom:16,border:"1px solid #667eea44"}}>
              <div style={{fontSize:12,color:"#a0aec0",marginBottom:12,fontWeight:600}}>{editGId?"Редактировать группу":"Новая группа"}</div>
              <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
                <Input label="Название" value={gForm.name} onChange={v=>setGForm(f=>({...f,name:v}))} placeholder="Электроника, Мебель..." style={{flex:2,minWidth:160}} />
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <label style={labelStyle}>Цвет</label>
                  <div style={{display:"flex",gap:5}}>{GROUP_COLORS.map(c=>(
                    <div key={c} onClick={()=>setGForm(f=>({...f,color:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:gForm.color===c?"3px solid #fff":"3px solid transparent",boxSizing:"border-box"}} />
                  ))}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn onClick={saveGroup} color="#667eea">Сохранить</Btn>
                  <Btn onClick={()=>setShowGForm(false)} color="#4a5568">Отмена</Btn>
                </div>
              </div>
            </Card>
          )}

          <Card>
            <div style={{fontSize:12,color:"#718096",marginBottom:10}}>{editId?"✏️ Редактирование":"➕ Добавление товара"}</div>
            <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
              <Input label="Код товара" value={form.code} onChange={v=>setForm(f=>({...f,code:v}))} placeholder="T-001" style={{width:110}} />
              <Input label="Наименование" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Название товара" style={{flex:2,minWidth:180}} />
              <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:160}}>
                <label style={labelStyle}>Группа</label>
                <select style={selectStyle} value={form.groupId} onChange={e=>setForm(f=>({...f,groupId:e.target.value}))}>
                  <option value="">— Без группы —</option>
                  {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={save} color={editId?"#48bb78":"#667eea"}>{editId?"💾 Сохранить":"+ Добавить"}</Btn>
                {editId && <Btn onClick={()=>{setEditId(null);setForm({code:"",name:"",groupId:""});}} color="#4a5568">Отмена</Btn>}
              </div>
            </div>
          </Card>

          <div style={{marginTop:14}}><Input label="" value={search} onChange={setSearch} placeholder="🔍 Поиск по коду или названию..." /></div>

          <Table headers={["Код","Группа","Наименование",""]} style={{marginTop:12}}>
            {filtered.length===0 && <EmptyRow cols={4} text="Товары не найдены" />}
            {filtered.map(p => {
              const grp = getGroup(p.groupId);
              return (
                <tr key={p.id}>
                  <Td bold mono>{p.code}</Td>
                  <Td>{grp?<span style={{background:grp.color+"22",color:grp.color,padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,border:`1px solid ${grp.color}44`}}>{grp.name}</span>:<span style={{color:"#4a5568",fontSize:11}}>—</span>}</Td>
                  <Td>{p.name}</Td>
                  <Td><ActionMenu onEdit={()=>startEdit(p)} onDelete={()=>del(p.id)} /></Td>
                </tr>
              );
            })}
          </Table>
        </div>
      );
    }

    function sortByCode(arr) {
      return [...arr].sort((a,b)=>{
        const na = a.code.replace(/[^0-9]/g,''); const nb = b.code.replace(/[^0-9]/g,'');
        if(na && nb) return Number(na)-Number(nb);
        return a.code.localeCompare(b.code);
      });
    }

    // ── INCOMING TAB ─────────────────────────────────────────────────────────
    function IncomingTab({ incoming, setIncoming, products, groups }) {
      const [form, setForm] = useState({ code:"", name:"", qty:"", cost:"", date:today() });
      const [selectedGroup, setSelectedGroup] = useState("");
      const [search, setSearch] = useState("");

      const noGroupProducts = products.filter(p=>!p.groupId||!groups.find(g=>g.id===p.groupId));
      const groupsWithProducts = groups.filter(g=>products.some(p=>p.groupId===g.id));

      const productsInGroup = selectedGroup === "__none__"
        ? sortByCode(noGroupProducts)
        : selectedGroup
          ? sortByCode(products.filter(p=>p.groupId===selectedGroup))
          : [];

      const selectGroup = gid => { setSelectedGroup(gid); setForm(f=>({...f,code:"",name:""})); };
      const selectProduct = code => { const p=products.find(x=>x.code===code); if(p) setForm(f=>({...f,code:p.code,name:p.name})); };

      const save = () => {
        if (!form.code||!form.qty||!form.cost||!form.date) return;
        setIncoming(prev=>[...prev,{...form,id:Date.now()}]);
        setForm(f=>({...f,code:"",name:"",qty:"",cost:""}));
      };
      const del = id => { if(confirm("Удалить запись?")) setIncoming(prev=>prev.filter(r=>r.id!==id)); };

      const filtered = incoming.filter(r=>r.name?.toLowerCase().includes(search.toLowerCase())||r.code?.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const total = filtered.reduce((s,r)=>s+Number(r.qty)*Number(r.cost),0);

      return (
        <div>
          <SectionTitle icon="📥" title="Приход товара" />
          <Card>
            <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>

              {/* Шаг 1 — выбор группы */}
              <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:160}}>
                <label style={labelStyle}>① Группа</label>
                <select style={selectStyle} value={selectedGroup} onChange={e=>selectGroup(e.target.value)}>
                  <option value="">— Выберите группу —</option>
                  {groupsWithProducts.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                  {noGroupProducts.length>0&&<option value="__none__">Без группы</option>}
                </select>
              </div>

              {/* Шаг 2 — выбор товара */}
              <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:180}}>
                <label style={labelStyle}>② Товар</label>
                <select style={{...selectStyle, opacity: selectedGroup?1:0.5}} value={form.code} onChange={e=>selectProduct(e.target.value)} disabled={!selectedGroup}>
                  <option value="">— Выберите товар —</option>
                  {productsInGroup.map(p=><option key={p.id} value={p.code}>{p.code} — {p.name}</option>)}
                </select>
              </div>

              <Input label="Код" value={form.code} readOnly style={{width:90}} />
              <Input label="Наименование" value={form.name} readOnly style={{flex:2,minWidth:140}} />
              <Input label="Количество" value={form.qty} onChange={v=>setForm(f=>({...f,qty:v}))} placeholder="0" type="number" style={{width:100}} />
              <Input label="Себестоимость" value={form.cost} onChange={v=>setForm(f=>({...f,cost:v}))} placeholder="0.00" type="number" style={{width:120}} />
              <Input label="Дата" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date" style={{width:145}} />
              <Btn onClick={save} color="#48bb78">+ Добавить</Btn>
            </div>
          </Card>
          <div style={{marginTop:14}}><Input label="" value={search} onChange={setSearch} placeholder="🔍 Поиск..." /></div>
          <Table headers={["Дата","Код","Наименование","Кол-во","Себестоимость","Сумма",""]} style={{marginTop:12}}>
            {filtered.length===0 && <EmptyRow cols={7} text="Нет записей прихода" />}
            {filtered.map(r=>(
              <tr key={r.id}>
                <Td small>{r.date}</Td><Td bold mono>{r.code}</Td><Td>{r.name}</Td>
                <Td right>{r.qty}</Td><Td right>{fmt(r.cost)}</Td>
                <Td right bold>{fmt(Number(r.qty)*Number(r.cost))}</Td>
                <Td><ActionMenu onEdit={()=>{}} onDelete={()=>del(r.id)} /></Td>
              </tr>
            ))}
            {filtered.length>0&&(<tr style={{background:"#1a202c"}}><td colSpan={5} style={{padding:"8px 12px",color:"#a0aec0",fontSize:12,textAlign:"right",fontWeight:600}}>Итого:</td><td style={{padding:"8px 12px",color:"#48bb78",fontWeight:700,textAlign:"right"}}>{fmt(total)}</td><td/></tr>)}
          </Table>
        </div>
      );
    }

    // ── OUTGOING TAB ─────────────────────────────────────────────────────────
    function OutgoingTab({ outgoing, setOutgoing, products, stock, groups }) {
      const [form, setForm] = useState({ code:"", name:"", qty:"", price:"", date:today(), note:"" });
      const [selectedGroup, setSelectedGroup] = useState("");
      const [search, setSearch] = useState("");
      const [filterPaid, setFilterPaid] = useState("all");

      const noGroupProducts = products.filter(p=>!p.groupId||!groups.find(g=>g.id===p.groupId));
      const groupsWithProducts = groups.filter(g=>products.some(p=>p.groupId===g.id));

      const productsInGroup = selectedGroup === "__none__"
        ? sortByCode(noGroupProducts)
        : selectedGroup
          ? sortByCode(products.filter(p=>p.groupId===selectedGroup))
          : [];

      const selectGroup = gid => { setSelectedGroup(gid); setForm(f=>({...f,code:"",name:""})); };
      const selectProduct = code => { const p=products.find(x=>x.code===code); if(p) setForm(f=>({...f,code:p.code,name:p.name})); };

      const save = () => {
        if (!form.code||!form.qty||!form.price||!form.date) return;
        const s=stock[form.code];
        if (s&&Number(form.qty)>s.qty) { if(!confirm(`На складе только ${s.qty} шт. Всё равно добавить?`)) return; }
        setOutgoing(prev=>[...prev,{...form,id:Date.now(),paid:false}]);
        setForm(f=>({...f,code:"",name:"",qty:"",price:"",note:""}));
      };
      const togglePaid = id => setOutgoing(prev=>prev.map(r=>r.id===id?{...r,paid:!r.paid}:r));
      const del = id => { if(confirm("Удалить запись?")) setOutgoing(prev=>prev.filter(r=>r.id!==id)); };

      const filtered = outgoing.filter(r=>{
        const ms=r.name?.toLowerCase().includes(search.toLowerCase())||r.code?.toLowerCase().includes(search.toLowerCase());
        const mp=filterPaid==="all"||(filterPaid==="paid"&&r.paid)||(filterPaid==="unpaid"&&!r.paid);
        return ms&&mp;
      }).sort((a,b)=>new Date(b.date)-new Date(a.date));

      const totalSales=filtered.reduce((s,r)=>s+Number(r.qty)*Number(r.price),0);
      const totalPaid=filtered.filter(r=>r.paid).reduce((s,r)=>s+Number(r.qty)*Number(r.price),0);

      return (
        <div>
          <SectionTitle icon="📤" title="Расход товара" />
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <StatCard label="Всего продаж" value={fmt(totalSales)} color="#667eea" />
            <StatCard label="✅ Оплачено" value={fmt(totalPaid)} color="#48bb78" />
            <StatCard label="⏳ Ожидает" value={fmt(totalSales-totalPaid)} color="#ed8936" />
          </div>
          <Card>
            <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>

              {/* Шаг 1 — выбор группы */}
              <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:160}}>
                <label style={labelStyle}>① Группа</label>
                <select style={selectStyle} value={selectedGroup} onChange={e=>selectGroup(e.target.value)}>
                  <option value="">— Выберите группу —</option>
                  {groupsWithProducts.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                  {noGroupProducts.length>0&&<option value="__none__">Без группы</option>}
                </select>
              </div>

              {/* Шаг 2 — выбор товара */}
              <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:180}}>
                <label style={labelStyle}>② Товар</label>
                <select style={{...selectStyle, opacity:selectedGroup?1:0.5}} value={form.code} onChange={e=>selectProduct(e.target.value)} disabled={!selectedGroup}>
                  <option value="">— Выберите товар —</option>
                  {productsInGroup.map(p=><option key={p.id} value={p.code}>{p.code} — {p.name} (ост: {stock[p.code]?.qty||0})</option>)}
                </select>
              </div>

              <Input label="Код" value={form.code} readOnly style={{width:90}} />
              <Input label="Наименование" value={form.name} readOnly style={{flex:2,minWidth:140}} />
              <Input label="Кол-во" value={form.qty} onChange={v=>setForm(f=>({...f,qty:v}))} placeholder="0" type="number" style={{width:90}} />
              <Input label="Цена продажи" value={form.price} onChange={v=>setForm(f=>({...f,price:v}))} placeholder="0.00" type="number" style={{width:120}} />
              <Input label="Дата" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date" style={{width:145}} />
              <Input label="Примечание" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="Клиент..." style={{flex:1.5,minWidth:120}} />
              <Btn onClick={save} color="#e53e3e">+ Добавить</Btn>
            </div>
          </Card>
          <div style={{display:"flex",gap:12,marginTop:14,alignItems:"center",flexWrap:"wrap"}}>
            <Input label="" value={search} onChange={setSearch} placeholder="🔍 Поиск..." style={{flex:1,minWidth:200}} />
            <div style={{display:"flex",gap:6}}>
              {[["all","Все"],["paid","Оплачено"],["unpaid","Не оплачено"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFilterPaid(v)} style={{background:filterPaid===v?(v==="paid"?"#276749":v==="unpaid"?"#7b341e":"#3c366b"):"#2d3748",border:"none",color:filterPaid===v?"#fff":"#a0aec0",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:500}}>{l}</button>
              ))}
            </div>
          </div>
          <Table headers={["Дата","Код","Наименование","Кол-во","Цена","Сумма","Примечание","Оплата",""]} style={{marginTop:12}}>
            {filtered.length===0 && <EmptyRow cols={9} text="Нет записей расхода" />}
            {filtered.map(r=>(
              <tr key={r.id} style={{background:r.paid?"rgba(72,187,120,0.06)":"transparent"}}>
                <Td small>{r.date}</Td><Td bold mono>{r.code}</Td><Td>{r.name}</Td>
                <Td right>{r.qty}</Td><Td right>{fmt(r.price)}</Td>
                <Td right bold style={{color:r.paid?"#48bb78":"#ed8936"}}>{fmt(Number(r.qty)*Number(r.price))}</Td>
                <Td small muted>{r.note}</Td>
                <Td>
                  <button onClick={()=>togglePaid(r.id)} style={{background:r.paid?"#276749":"#2d3748",border:`1px solid ${r.paid?"#48bb78":"#4a5568"}`,color:r.paid?"#68d391":"#718096",padding:"3px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
                    {r.paid?"✅ Оплачено":"⏳ Ожидание"}
                  </button>
                </Td>
                <Td><ActionMenu onEdit={()=>{}} onDelete={()=>del(r.id)} /></Td>
              </tr>
            ))}
            {filtered.length>0&&(<tr style={{background:"#1a202c"}}><td colSpan={5} style={{padding:"8px 12px",color:"#a0aec0",fontSize:12,textAlign:"right",fontWeight:600}}>Итого:</td><td style={{padding:"8px 12px",color:"#e2e8f0",fontWeight:700,textAlign:"right"}}>{fmt(totalSales)}</td><td colSpan={3}/></tr>)}
          </Table>
        </div>
      );
    }

    // ── STOCK TAB ────────────────────────────────────────────────────────────
    function StockTab({ stock, groups }) {
      const [search, setSearch] = useState("");
      const [filterGroup, setFilterGroup] = useState("all");

      const items = Object.values(stock).filter(p=>{
        const ms=p.name?.toLowerCase().includes(search.toLowerCase())||p.code?.toLowerCase().includes(search.toLowerCase());
        const mg=filterGroup==="all"||p.groupId===filterGroup||(filterGroup==="nogroup"&&!p.groupId);
        return ms&&mg;
      });

      return (
        <div>
          <SectionTitle icon="📊" title="Остатки на складе" />
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <StatCard label="Позиций" value={items.length} color="#667eea" />
            <StatCard label="Всего единиц" value={items.reduce((s,i)=>s+i.qty,0)} color="#48bb78" />
            <StatCard label="Сумма склада" value={fmt(items.reduce((s,i)=>s+i.qty*i.avgCost,0))} color="#ed8936" />
          </div>
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <Input label="" value={search} onChange={setSearch} placeholder="🔍 Поиск..." style={{flex:1,minWidth:200}} />
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <GroupPill active={filterGroup==="all"} onClick={()=>setFilterGroup("all")} color="#667eea">Все</GroupPill>
              <GroupPill active={filterGroup==="nogroup"} onClick={()=>setFilterGroup("nogroup")} color="#718096">Без группы</GroupPill>
              {groups.map(g=><GroupPill key={g.id} active={filterGroup===g.id} onClick={()=>setFilterGroup(g.id)} color={g.color}>{g.name}</GroupPill>)}
            </div>
            <button onClick={()=>exportExcel(items,groups)} style={{background:"linear-gradient(135deg,#276749,#2f855a)",border:"none",color:"#fff",padding:"8px 16px",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(72,187,120,0.3)",whiteSpace:"nowrap"}}>
              📥 Экспорт в Excel
            </button>
          </div>
          <Table headers={["Код","Группа","Наименование","Остаток (шт)","Ср. себестоимость","Сумма на складе","Статус"]}>
            {items.length===0 && <EmptyRow cols={7} text="Нет товаров" />}
            {[...items].sort((a,b)=>a.code.localeCompare(b.code)).map(p=>{
              const grp=groups.find(g=>g.id===p.groupId);
              return (
                <tr key={p.id}>
                  <Td bold mono>{p.code}</Td>
                  <Td>{grp?<span style={{background:grp.color+"22",color:grp.color,padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,border:`1px solid ${grp.color}44`}}>{grp.name}</span>:<span style={{color:"#4a5568",fontSize:11}}>—</span>}</Td>
                  <Td>{p.name}</Td>
                  <Td right bold style={{color:p.qty<=0?"#e53e3e":p.qty<5?"#ed8936":"#48bb78"}}>{p.qty}</Td>
                  <Td right>{fmt(p.avgCost)}</Td>
                  <Td right>{fmt(p.qty*p.avgCost)}</Td>
                  <Td><span style={{background:p.qty<=0?"#742a2a":p.qty<5?"#7b341e":"#276749",color:p.qty<=0?"#fc8181":p.qty<5?"#fbd38d":"#68d391",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{p.qty<=0?"Нет в наличии":p.qty<5?"Заканчивается":"В наличии"}</span></Td>
                </tr>
              );
            })}
          </Table>
        </div>
      );
    }

    // ── ANALYTICS TAB ────────────────────────────────────────────────────────
    function AnalyticsTab({ outgoing, incoming }) {
      const [year, setYear] = useState(new Date().getFullYear());
      const years=[...new Set([...outgoing.map(r=>new Date(r.date).getFullYear()),...incoming.map(r=>new Date(r.date).getFullYear()),new Date().getFullYear()])].sort((a,b)=>b-a);

      const monthlyData=useMemo(()=>Array.from({length:12},(_,m)=>{
        const sales=outgoing.filter(r=>{const d=new Date(r.date);return d.getFullYear()===year&&d.getMonth()===m;});
        const purchases=incoming.filter(r=>{const d=new Date(r.date);return d.getFullYear()===year&&d.getMonth()===m;});
        const revenue=sales.reduce((s,r)=>s+Number(r.qty)*Number(r.price),0);
        const paid=sales.filter(r=>r.paid).reduce((s,r)=>s+Number(r.qty)*Number(r.price),0);
        const cost=purchases.reduce((s,r)=>s+Number(r.qty)*Number(r.cost),0);
        return {month:MONTHS_RU[m],revenue,paid,cost,items:sales.reduce((s,r)=>s+Number(r.qty),0),transactions:sales.length};
      }),[outgoing,incoming,year]);

      const topProducts=useMemo(()=>{
        const map={};
        outgoing.filter(r=>new Date(r.date).getFullYear()===year).forEach(r=>{
          if(!map[r.code]) map[r.code]={code:r.code,name:r.name,qty:0,revenue:0};
          map[r.code].qty+=Number(r.qty); map[r.code].revenue+=Number(r.qty)*Number(r.price);
        });
        return Object.values(map).sort((a,b)=>b.revenue-a.revenue).slice(0,10);
      },[outgoing,year]);

      const maxRevenue=Math.max(...monthlyData.map(d=>d.revenue),1);
      const total=monthlyData.reduce((s,d)=>({revenue:s.revenue+d.revenue,paid:s.paid+d.paid,cost:s.cost+d.cost,items:s.items+d.items}),{revenue:0,paid:0,cost:0,items:0});

      return (
        <div>
          <SectionTitle icon="📈" title="Аналитика продаж" />
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <span style={{color:"#718096",fontSize:13}}>Год:</span>
            {years.map(y=><button key={y} onClick={()=>setYear(y)} style={{background:year===y?"#667eea":"#2d3748",border:"none",color:year===y?"#fff":"#a0aec0",padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:year===y?600:400}}>{y}</button>)}
          </div>
          <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <StatCard label="Выручка за год" value={fmt(total.revenue)} color="#667eea" />
            <StatCard label="Оплачено" value={fmt(total.paid)} color="#48bb78" />
            <StatCard label="Закуплено" value={fmt(total.cost)} color="#ed8936" />
            <StatCard label="Продано единиц" value={total.items} color="#9f7aea" />
          </div>
          <Card style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:600,color:"#a0aec0",marginBottom:16}}>Выручка по месяцам ({year})</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140}}>
              {monthlyData.map((d,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:9,color:"#718096",fontWeight:600}}>{d.revenue>0?fmt(d.revenue).replace(/\.00$/,""):""}</div>
                  <div style={{width:"100%",background:"linear-gradient(180deg,#667eea,#764ba2)",borderRadius:"3px 3px 0 0",height:`${Math.max((d.revenue/maxRevenue)*100,d.revenue>0?4:0)}%`,opacity:d.revenue>0?1:0.15,minHeight:d.revenue>0?4:0}} title={`${d.month}: ${fmt(d.revenue)}`} />
                  <div style={{fontSize:10,color:"#718096"}}>{d.month}</div>
                </div>
              ))}
            </div>
          </Card>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#a0aec0",marginBottom:8}}>📅 По месяцам</div>
              <Table headers={["Месяц","Выручка","Оплачено","Ед.","Сделок"]}>
                {monthlyData.map((d,i)=>(
                  <tr key={i} style={{opacity:d.revenue===0?0.4:1}}>
                    <Td small>{d.month}</Td>
                    <Td right bold style={{color:"#667eea"}}>{d.revenue>0?fmt(d.revenue):"—"}</Td>
                    <Td right style={{color:"#48bb78"}}>{d.paid>0?fmt(d.paid):"—"}</Td>
                    <Td right>{d.items||"—"}</Td>
                    <Td right>{d.transactions||"—"}</Td>
                  </tr>
                ))}
              </Table>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#a0aec0",marginBottom:8}}>🏆 Топ товаров</div>
              <Table headers={["Код","Наименование","Шт.","Выручка"]}>
                {topProducts.length===0 && <EmptyRow cols={4} text="Нет данных" />}
                {topProducts.map((p,i)=>(
                  <tr key={i}><Td mono small>{p.code}</Td><Td small>{p.name}</Td><Td right>{p.qty}</Td><Td right bold style={{color:"#667eea"}}>{fmt(p.revenue)}</Td></tr>
                ))}
              </Table>
            </div>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState(0);
      const [products, setProducts] = useLS("wh_products2", []);
      const [groups, setGroups] = useLS("wh_groups2", []);
      const [incoming, setIncoming] = useLS("wh_incoming2", []);
      const [outgoing, setOutgoing] = useLS("wh_outgoing2", []);

      const stock = useMemo(() => {
        const map = {};
        products.forEach(p => { map[p.code] = { ...p, qty: 0, avgCost: 0, totalCost: 0 }; });
        incoming.forEach(r => {
          if (!map[r.code]) return;
          const prev = map[r.code];
          const newQty = prev.qty + Number(r.qty);
          const newCost = prev.totalCost + Number(r.qty) * Number(r.cost);
          map[r.code].qty = newQty; map[r.code].totalCost = newCost;
          map[r.code].avgCost = newQty > 0 ? newCost / newQty : 0;
        });
        outgoing.forEach(r => { if (map[r.code]) map[r.code].qty -= Number(r.qty); });
        return map;
      }, [products, incoming, outgoing]);

      return (
        <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:"#0f1117",minHeight:"100vh",color:"#e2e8f0"}}>
          <div style={{background:"linear-gradient(135deg,#1a1f2e,#16213e)",borderBottom:"1px solid #2d3748",padding:"14px 24px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}}>
            <div style={{width:36,height:36,background:"linear-gradient(135deg,#667eea,#764ba2)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📦</div>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:"#fff"}}>СкладПро</div>
              <div style={{fontSize:11,color:"#718096"}}>Система учёта товаров</div>
            </div>
          </div>
          <div style={{display:"flex",borderBottom:"1px solid #2d3748",background:"#141720",padding:"0 16px",overflowX:"auto",position:"sticky",top:64,zIndex:99}}>
            {TABS.map((t,i) => (
              <button key={i} onClick={() => setTab(i)} style={{background:"none",border:"none",color:tab===i?"#667eea":"#718096",borderBottom:tab===i?"2px solid #667eea":"2px solid transparent",padding:"12px 18px",cursor:"pointer",fontSize:13,fontWeight:tab===i?600:400,whiteSpace:"nowrap"}}>{t}</button>
            ))}
          </div>
          <div style={{padding:20}}>
            {tab===0 && <ProductsTab products={products} setProducts={setProducts} groups={groups} setGroups={setGroups} />}
            {tab===1 && <IncomingTab incoming={incoming} setIncoming={setIncoming} products={products} groups={groups} />}
            {tab===2 && <OutgoingTab outgoing={outgoing} setOutgoing={setOutgoing} products={products} stock={stock} groups={groups} />}
            {tab===3 && <StockTab stock={stock} groups={groups} />}
            {tab===4 && <AnalyticsTab outgoing={outgoing} incoming={incoming} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Service Worker for offline support -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

</body>
